# Release pipeline for ELVES — builds macOS DMG and creates a GitHub Release on tag push.
# Also supports manual dispatch to re-run formula update against an existing release.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "20"
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS DMG
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build .app bundle with Tauri
        run: npx tauri build

      - name: Ad-hoc codesign the .app bundle
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          echo "Signing $APP_PATH..."
          codesign --force --deep --sign - "$APP_PATH"

      - name: Verify codesign
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Codesign verification passed."

      - name: Create DMG from signed .app
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          VERSION="${RELEASE_TAG#v}"
          DMG_NAME="ELVES_${VERSION}_aarch64.dmg"
          hdiutil create \
            -volname "ELVES" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          echo "Created $DMG_NAME"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}
          retention-days: 1

      - name: Create GitHub Release
        run: |
          gh release create "$RELEASE_TAG" \
            --title "ELVES $RELEASE_TAG" \
            --notes "$(cat <<'NOTES'
          See the [CHANGELOG](https://github.com/mvmcode/elves/blob/main/CHANGELOG.md) for details.

          ## Install

          ### Homebrew (recommended)
          ```bash
          brew install --no-quarantine --cask mvmcode/tap/elves
          ```

          ### Direct Download
          1. Download `ELVES_<version>_aarch64.dmg` below
          2. Open the DMG and drag ELVES to Applications
          3. **Important:** ELVES is not notarized (open-source project). On first launch:
             - Right-click ELVES.app → **Open** → click **Open** in the dialog
             - Or run: `xattr -cr /Applications/ELVES.app`
          NOTES
          )" \
            "$DMG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    needs: build-macos
    if: always() && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Download DMG from workflow artifact
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: /tmp/dmg

      - name: Download DMG from release (workflow_dispatch fallback)
        if: needs.build-macos.result == 'skipped'
        run: gh release download "$RELEASE_TAG" --pattern "*.dmg" --dir /tmp/dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Compute SHA256
        id: sha
        run: |
          DMG_FILE=$(ls /tmp/dmg/*.dmg)
          SHA=$(sha256sum "$DMG_FILE" | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA"

      - name: Update Homebrew formula
        run: |
          sed -i "s/version \".*\"/version \"${{ steps.version.outputs.VERSION }}\"/" packaging/homebrew/elves.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.SHA256 }}\"/" packaging/homebrew/elves.rb

      - name: Verify formula update
        run: cat packaging/homebrew/elves.rb

      - name: Create or update PR with updated formula
        run: |
          BRANCH="chore/homebrew-${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists from a previous run
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add packaging/homebrew/elves.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(homebrew): update formula to ${{ env.RELEASE_TAG }}"
          git push origin "$BRANCH"

          # Create PR, or update the existing one if it's still open
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists — force-pushed updated branch."
          else
            gh pr create \
              --title "chore(homebrew): update formula to ${{ env.RELEASE_TAG }}" \
              --body "Automated formula update from release workflow. Updates version and SHA256 for ${{ env.RELEASE_TAG }}." \
              --base main \
              --head "$BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

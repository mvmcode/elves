# Release pipeline for ELVES — builds macOS DMG and creates a GitHub Release on tag push.
# Also supports manual dispatch to re-run formula update against an existing release.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "20"
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS DMG
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: cargo-release-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build .app bundle with Tauri
        run: npx tauri build

      - name: Ad-hoc codesign the .app bundle
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          echo "Signing $APP_PATH..."
          codesign --force --deep --sign - "$APP_PATH"

      - name: Verify codesign
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Codesign verification passed."

      - name: Create DMG from signed .app
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/ELVES.app"
          VERSION="${RELEASE_TAG#v}"
          DMG_NAME="ELVES_${VERSION}_aarch64.dmg"
          hdiutil create \
            -volname "ELVES" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          echo "Created $DMG_NAME"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_NAME }}
          retention-days: 1

      - name: Generate updater manifest (latest.json)
        run: |
          VERSION="${RELEASE_TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DMG_URL="https://github.com/mvmcode/elves/releases/download/${RELEASE_TAG}/${DMG_NAME}"
          SIGNATURE=""

          # Sign the DMG tarball if the signing key is available
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            # Create a gzip tarball of the DMG for signing
            gzip -c "$DMG_NAME" > "${DMG_NAME}.tar.gz"
            SIGNATURE=$(echo -n "" | npx tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" "${DMG_NAME}.tar.gz" 2>/dev/null || echo "")
            rm -f "${DMG_NAME}.tar.gz"
          fi

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the CHANGELOG for details: https://github.com/mvmcode/elves/blob/main/CHANGELOG.md",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${DMG_URL}",
                "signature": "${SIGNATURE}"
              }
            }
          }
          EOF

          echo "Generated latest.json for ${VERSION}"
          cat latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD || '' }}

      - name: Create or update GitHub Release
        run: |
          RELEASE_NOTES="$(cat <<'NOTES'
          See the [CHANGELOG](https://github.com/mvmcode/elves/blob/main/CHANGELOG.md) for details.

          ## Install

          ### Homebrew (recommended)
          ```bash
          brew install --no-quarantine --cask mvmcode/tap/elves
          ```

          ### Direct Download
          1. Download `ELVES_<version>_aarch64.dmg` below
          2. Open the DMG and drag ELVES to Applications
          3. **Important:** ELVES is not notarized (open-source project). On first launch:
             - Right-click ELVES.app → **Open** → click **Open** in the dialog
             - Or run: `xattr -cr /Applications/ELVES.app`
          NOTES
          )"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — updating..."
            gh release edit "$RELEASE_TAG" \
              --title "ELVES $RELEASE_TAG" \
              --notes "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" "$DMG_NAME" latest.json --clobber
          else
            echo "Creating new release $RELEASE_TAG..."
            gh release create "$RELEASE_TAG" \
              --title "ELVES $RELEASE_TAG" \
              --notes "$RELEASE_NOTES" \
              "$DMG_NAME" \
              latest.json
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    if: always() && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Download DMG from workflow artifact
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: /tmp/dmg

      - name: Download DMG from release (workflow_dispatch fallback)
        if: needs.build-macos.result == 'skipped'
        run: gh release download "$RELEASE_TAG" --pattern "*.dmg" --dir /tmp/dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Compute SHA256
        id: sha
        run: |
          DMG_FILE=$(ls /tmp/dmg/*.dmg)
          SHA=$(sha256sum "$DMG_FILE" | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $SHA"

      - name: Clone homebrew-tap and update formula
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/mvmcode/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/elves.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/elves.rb

          echo "Updated formula:"
          cat Casks/elves.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/elves.rb
          git diff --cached --quiet && echo "Formula already up to date" && exit 0
          git commit -m "chore: update elves to v${VERSION}"
          git push origin main

          echo "Pushed formula update to homebrew-tap"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
